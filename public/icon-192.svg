<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" fill="#3B82F6" rx="45"/>
  
  <!-- Outer circle -->
  <circle cx="96" cy="96" r="70" fill="#1E40AF" opacity="0.3"/>
  
  <!-- Currency symbol -->
  <g transform="translate(96, 96)">
    <!-- Dollar sign -->
    <text x="0" y="40" font-size="80" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">$</text>
  </g>
  
  <!-- Accent circles -->
  <circle cx="40" cy="40" r="15" fill="#60A5FA" opacity="0.4"/>
  <circle cx="152" cy="152" r="20" fill="#60A5FA" opacity="0.4"/>
</svg>