<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#3B82F6" rx="120"/>
  
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="186" fill="#1E40AF" opacity="0.3"/>
  
  <!-- Currency symbol -->
  <g transform="translate(256, 256)">
    <!-- Dollar sign -->
    <text x="0" y="110" font-size="220" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">$</text>
  </g>
  
  <!-- Accent circles -->
  <circle cx="100" cy="100" r="40" fill="#60A5FA" opacity="0.4"/>
  <circle cx="412" cy="412" r="55" fill="#60A5FA" opacity="0.4"/>
</svg>