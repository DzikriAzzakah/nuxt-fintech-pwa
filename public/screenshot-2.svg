<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 720" width="540" height="720">
  <!-- Phone background -->
  <rect width="540" height="720" fill="#F9FAFB"/>
  
  <!-- Header -->
  <rect width="540" height="80" fill="#F3F4F6"/>
  <text x="30" y="50" font-size="28" font-weight="bold" fill="#1F2937" font-family="Arial">Analytics</text>
  
  <!-- Date filter -->
  <rect x="20" y="100" width="500" height="45" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="30" y="110" width="90" height="25" rx="6" fill="#3B82F6"/>
  <text x="75" y="128" font-size="12" fill="white" text-anchor="middle" font-family="Arial">This Month</text>
  <rect x="135" y="110" width="80" height="25" rx="6" fill="#F3F4F6"/>
  <text x="175" y="128" font-size="12" fill="#6B7280" text-anchor="middle" font-family="Arial">Last Month</text>
  
  <!-- Category breakdown chart -->
  <text x="30" y="185" font-size="16" font-weight="bold" fill="#1F2937" font-family="Arial">Category Breakdown</text>
  
  <!-- Pie chart representation -->
  <circle cx="270" cy="310" r="90" fill="none" stroke="#E5E7EB" stroke-width="40" opacity="0.3"/>
  <circle cx="270" cy="310" r="90" fill="none" stroke="#3B82F6" stroke-width="40" stroke-dasharray="141.37 565.49"/>
  <circle cx="270" cy="310" r="90" fill="none" stroke="#10B981" stroke-width="40" stroke-dasharray="141.37 565.49" stroke-dashoffset="-141.37"/>
  <circle cx="270" cy="310" r="90" fill="none" stroke="#F59E0B" stroke-width="40" stroke-dasharray="70.68 565.49" stroke-dashoffset="-282.74"/>
  
  <!-- Legend -->
  <rect x="30" y="430" width="480" height="20" rx="4" fill="#FFF7ED"/>
  <circle cx="45" cy="440" r="6" fill="#F97316"/>
  <text x="60" y="443" font-size="12" fill="#1F2937" font-family="Arial">Food: 45%</text>
  
  <rect x="30" y="460" width="480" height="20" rx="4" fill="#E0F2FE"/>
  <circle cx="45" cy="470" r="6" fill="#0EA5E9"/>
  <text x="60" y="473" font-size="12" fill="#1F2937" font-family="Arial">Transport: 30%</text>
  
  <rect x="30" y="490" width="480" height="20" rx="4" fill="#F0FDF4"/>
  <circle cx="45" cy="500" r="6" fill="#22C55E"/>
  <text x="60" y="503" font-size="12" fill="#1F2937" font-family="Arial">Shopping: 25%</text>
  
  <!-- Comparison chart -->
  <text x="30" y="550" font-size="16" font-weight="bold" fill="#1F2937" font-family="Arial">Period Comparison</text>
  
  <!-- Bar chart representation -->
  <rect x="60" y="580" width="30" height="60" fill="#3B82F6" rx="3"/>
  <rect x="100" y="570" width="30" height="70" fill="#10B981" rx="3"/>
  <rect x="140" y="575" width="30" height="65" fill="#3B82F6" rx="3"/>
  <rect x="180" y="565" width="30" height="75" fill="#10B981" rx="3"/>
  
  <text x="75" y="660" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial">Food</text>
  <text x="115" y="660" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial">Fuel</text>
  <text x="155" y="660" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial">Shop</text>
  <text x="195" y="660" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial">Other</text>
  
  <!-- Bottom nav bar -->
  <rect y="680" width="540" height="40" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="80" y="705" font-size="24" text-anchor="middle">🏠</text>
  <text x="270" y="705" font-size="24" text-anchor="middle">📊</text>
  
  <!-- Add button -->
  <circle cx="500" cy="640" r="28" fill="#3B82F6"/>
  <text x="500" y="650" font-size="36" fill="white" text-anchor="middle" font-family="Arial">+</text>
</svg>